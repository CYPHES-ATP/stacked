name: Phase task
description: Track a roadmap task for Phase 1 or Phase 2.
title: "[Task]: "
labels:
  - task
body:
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - Phase 1.0: Foundation
        - Phase 1.1: CYPHES UI Shell
        - Phase 1.2: Runtime Rebrand
        - Phase 1.3: Permission And Receipt UX
        - Phase 1.4: Internal Alpha
        - Phase 2.0: CYPHES v0.1
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true when this is done?
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ]
        - [ ]
        - [ ]
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this be tested or reviewed?
