name: Bug report
description: Report a reproducible problem in CYPHES.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include API keys, private prompts, private repository code, or secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-alpha.1 or commit SHA
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - TUI
        - CLI
        - ACP/editor integration
        - Provider integration
        - Tools/permissions
        - Docs/GitHub setup
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact secrets before posting.
      render: text
